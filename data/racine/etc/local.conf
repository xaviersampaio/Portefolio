# /etc/local.conf - configuration globale du système fictif

# Paramètres de localisation
LANG="fr_FR.UTF-8"
LC_TIME="fr_FR.UTF-8"
LC_MESSAGES="fr_FR.UTF-8"

# Paramètres réseau
HOSTNAME="Sampaio-OS"
DOMAINNAME=""

# Paramètres du système
ENABLE_CRON="yes"
DEFAULT_SHELL="/bin/bash"
UMASK="022"

# Options pour apt
APT_MIRROR="http://mirror.xavier-sampaio.me/repo"
AUTO_UPDATE="yes"

# Options graphiques
DISPLAY_MANAGER="gdm"
DEFAULT_XSESSION="gnome"

# Debug / logs
SYSLOG_LEVEL="info"
ENABLE_DEBUG="no"
