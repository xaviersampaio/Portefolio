# /etc/systemd/journald.conf 

[Journal]
# Stocker les logs en mode persistant (dans /var/log/journal)
Storage=persistent

# Taille maximale d’un fichier journal individuel
SystemMaxFileSize=50M

# Taille maximale totale pour le journal
SystemMaxUse=500M

# Nombre maximal de fichiers journal à garder
SystemKeepFree=100M

# Niveau minimal des messages à stocker
# options : emerg, alert, crit, err, warning, notice, info, debug
MaxLevelStore=info

# Compresser les anciens journaux pour économiser de l’espace
Compress=yes

# Inclure l’heure locale dans le journal
UTC=yes
