# /etc/systemd/logind.conf - configuration fictive

[Login]
# Suspendre l’ordinateur quand le bouton d’alimentation est pressé
HandlePowerKey=suspend

# Suspendre quand le bouton de veille est pressé
HandleSuspendKey=suspend

# Ne rien faire quand le bouton d’hibernation est pressé
HandleHibernateKey=ignore

# Ne pas suspendre lors de la fermeture du couvercle
HandleLidSwitch=ignore

# Activer le verrouillage automatique pour les sessions inactives
IdleAction=lock
IdleActionSec=15min

# Garder les sessions ouvertes même si l’utilisateur est déconnecté
KillUserProcesses=no

# Nombre maximal de sessions par utilisateur
UserTasksMax=512
