# /etc/systemd/pstore.conf 

[PersistentStorage]
# Activer le stockage persistant
Storage=persistent

# Taille maximale du stockage pour les logs du noyau
MaxUse=50M

# Conserver les logs après un reboot
KeepAfterReboot=yes

# Niveaux de logs à sauvegarder
MaxLevelStore=err

# Compression des logs pour économiser l’espace
Compress=yes

# Chemin du stockage persistant (fictif)
Directory=/var/log/pstore
