# /etc/systemd/system.conf

[Manager]
# Nombre maximal de tâches par utilisateur
DefaultTasksMax=512

# Niveau de journalisation de systemd
LogLevel=info

# Redémarrage automatique des services échoués
DefaultRestartSec=5s

# Timeout global pour le démarrage des services
DefaultTimeoutStartSec=90s
DefaultTimeoutStopSec=90s

# Nom d’hôte par défaut
Hostname=Sampaio-OS

# Contrôle de la politique de shutdown/reboot
RebootWatchdogSec=30s

# Gestion des ressources CPU et mémoire pour les services
DefaultCPUAccounting=yes
DefaultMemoryAccounting=yes
