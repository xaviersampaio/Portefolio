# /etc/systemd/sleep.conf 

[Sleep]
# Action par défaut lors de la fermeture du couvercle
# options : suspend, hibernate, hybrid-sleep, ignore
HandleLidSwitch=suspend

# Action par défaut lors du bouton d’alimentation
HandlePowerKey=poweroff

# Action par défaut lors du bouton de veille
HandleSuspendKey=suspend

# Action par défaut lors du bouton d’hibernation
HandleHibernateKey=hibernate

# Activer les hooks pour exécuter des scripts avant et après le sommeil
AllowSuspendHooks=yes
AllowHibernationHooks=yes

# Timeout pour forcer la suspension si elle échoue
SuspendTimeoutSec=30s
HibernateTimeoutSec=60s
HybridSleepTimeoutSec=90s
