# /etc/systemd/networkd.conf

[Network]
# Activer systemd-networkd au démarrage
Network=ethernet

# Temps d'attente maximum pour que l'interface soit configurée
LinkLocalAddressing=ipv4

# Activer ou désactiver le DHCP globalement
DHCP=yes

# Temps d'attente pour les changements d'adresse
RouteMetric=100

[DHCP]
# Durée maximale du bail DHCP
LeaseLifetime=3600

# Activer la configuration automatique des DNS via DHCP
UseDNS=yes

[DHCPv6]
# Activer la configuration DHCPv6 si nécessaire
UseDNS=yes

